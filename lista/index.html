<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista | CartGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .nav-lista { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .btn-back { background: #f0f0f0; color: #333; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 0.8rem; }
        .section-title { margin: 2rem 0 1rem; font-size: 1.1rem; font-weight: 700; color: var(--dark); }
        .list-pendientes { border-left: 6px solid #f1c40f; margin-bottom: 2rem; }
        .list-comprados { border-left: 6px solid #2ecc71; opacity: 0.8; }
        .shopping-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: white; margin-bottom: 5px; border-radius: 0 10px 10px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .comprado-texto { text-decoration: line-through; color: #95a5a6; }
        input[type="checkbox"] { transform: scale(1.4); cursor: pointer; }
    </style>
</head>
<body>

    <nav class="nav-lista">
        <div style="display:flex; align-items:center; gap:15px;">
            <a href="../dashboard/" class="btn-back">← Volver</a>
            <h2 id="tituloLista" style="margin:0; font-size: 1.2rem;">Cargando...</h2>
        </div>
        <button id="btnColab" class="btn btn-outline" style="padding:0.5rem 1rem; font-size:0.8rem;" onclick="invitarPersona()">+ Invitar</button>
    </nav>

    <main class="container" style="justify-content: flex-start; padding-top: 2rem;">
        <form id="addItemForm" style="width:100%; max-width:500px; display:flex; gap:10px; margin-bottom: 1rem;">
            <input type="text" id="itemName" class="btn" style="flex: 1; text-align: left; border: 2px solid #ddd;" placeholder="Añadir producto..." required>
            <button type="submit" id="btnAdd" class="btn btn-primary">Añadir</button>
        </form>

        <div style="width: 100%; max-width: 500px;">
            <div class="section-title">⏳ Pendientes</div>
            <div id="listaPendientes" class="shopping-list list-pendientes"></div>
            <div class="section-title">✅ Comprados</div>
            <div id="listaComprados" class="shopping-list list-comprados"></div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p style="color:#95a5a6; font-size:0.8rem; text-align:center; padding: 2rem;">🔄 Sincronizando cambios automáticamente...</p>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idLista = urlParams.get('id');
        const nombreLista = decodeURIComponent(urlParams.get('name') || "Lista");
        const isOwner = urlParams.get('owner') === 'true';
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzgT7fMgUJezpZlKU060N3p0SqLDEQKPByZG94a2-GIna7xIWkbCa0sJy3T3JWGw4Wq/exec";

        document.getElementById('tituloLista').innerText = nombreLista;
        if (!isOwner) document.getElementById('btnColab').style.display = 'none';

        async function cargarProductos() {
            try {
                const resp = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "getProducts", idLista: idLista }) });
                const data = await resp.json();
                const contP = document.getElementById('listaPendientes');
                const contC = document.getElementById('listaComprados');
                contP.innerHTML = ""; contC.innerHTML = "";

                data.productos.forEach(prod => {
                    const html = `
                        <div class="shopping-item">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <input type="checkbox" ${prod.comprado ? 'checked' : ''} onchange="toggleProducto(${prod.id}, ${!prod.comprado})">
                                <span class="${prod.comprado ? 'comprado-texto' : ''}">${prod.nombre}</span>
                            </div>
                            <button onclick="eliminarProducto(${prod.id})" style="border:none; background:none; color:#ff7675; cursor:pointer;">Eliminar</button>
                        </div>`;
                    prod.comprado ? contC.innerHTML += html : contP.innerHTML += html;
                });
            } catch (e) {}
        }

        document.getElementById('addItemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('itemName');
            const val = input.value;
            input.disabled = true; input.value = "Añadiendo...";
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "addProduct", idLista: idLista, nombre: val }) });
            input.disabled = false; input.value = "";
            cargarProductos();
        });

        async function toggleProducto(id, estado) {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "toggleProduct", idProd: id, comprado: estado }) });
            cargarProductos();
        }

        async function eliminarProducto(id) {
            if (confirm("¿Eliminar?")) {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "deleteProduct", idProd: id }) });
                cargarProductos();
            }
        }

        async function invitarPersona() {
            const email = prompt("Email del colaborador:");
            if (!email) return;
            const resp = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "addCollaborator", idLista: idLista, colabEmail: email }) });
            const res = await resp.json();
            alert(res.status === "success" ? "¡Añadido!" : "Error: " + res.message);
        }

        setInterval(cargarProductos, 10000);
        cargarProductos();
    </script>
</body>
</html>
