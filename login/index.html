<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | CartGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <main class="container">
        <div class="card">
            <h2>Bienvenido de nuevo</h2>
            <p>Accede a tus listas compartidas</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
            </form>

            <div class="form-footer">
                ¿No tienes cuenta? <a href="../register/">Crea una ahora</a>
            </div>
        </div>
        <a href="../" style="text-decoration: none; color: var(--text-muted); font-size: 0.8rem;">← Volver al inicio</a>
    </main>
    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2026 CartGo - Tu lista de la compra inteligente</p>
            <p class="sync-notice">
                <span class="sync-icon">🔄</span> 
                Los cambios pueden tardar unos segundos en sincronizarse con todos los dispositivos.
            </p>
        </div>
    </footer>
<script>
    const user = localStorage.getItem('userEmail');
    if (user) {
        window.location.href = "../dashboard"
    }

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzgT7fMgUJezpZlKU060N3p0SqLDEQKPByZG94a2-GIna7xIWkbCa0sJy3T3JWGw4Wq/exec"; // <--- PEGA TU URL AQUÍ

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "Verificando...";
        btn.disabled = true;

        const data = {
            action: "login",
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
        };

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            const result = await response.json();

            if (result.status === "success") {
                localStorage.setItem('userName', result.nombre);
                localStorage.setItem('userEmail', data.email);
                window.location.href = '../dashboard/';
            } else {
                alert("Email o contraseña incorrectos");
            }
        } catch (error) {
            alert("Error al conectar con el sistema");
        } finally {
            btn.innerText = "Entrar";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
