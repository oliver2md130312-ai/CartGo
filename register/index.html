<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | CartGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <main class="container">
        <div class="card">
            <h2>Crea tu cuenta</h2>
            <p>Únete a CartGo y empieza a colaborar</p>

            <form id="registerForm">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="regName" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="regPass" placeholder="Mínimo 6 caracteres" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarse</button>
            </form>

            <div class="form-footer">
                ¿Ya tienes cuenta? <a href="../login/">Inicia sesión</a>
            </div>
        </div>
    </main>
    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2026 CartGo - Tu lista de la compra inteligente</p>
            <p class="sync-notice">
                <span class="sync-icon">🔄</span> 
                Los cambios pueden tardar unos segundos en sincronizarse con todos los dispositivos.
            </p>
        </div>
    </footer>
<script>
    const user = localStorage.getItem('userEmail');
    if (user) {
        window.location.href = "../dashboard"
    }

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzgT7fMgUJezpZlKU060N3p0SqLDEQKPByZG94a2-GIna7xIWkbCa0sJy3T3JWGw4Wq/exec";

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const originalText = btn.innerText;
        
        btn.innerText = "Verificando...";
        btn.disabled = true;

        const data = {
            action: "register",
            nombre: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPass').value
        };

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            const result = await response.json();

            if (result.status === "success") {
                localStorage.setItem('userName', data.nombre);
                localStorage.setItem('userEmail', data.email);
                alert("¡Cuenta creada con éxito!");
                window.location.href = '../dashboard/';
            } else {
                // Aquí capturamos el error de "email ya existe"
                alert("⚠️ " + result.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        } catch (error) {
            alert("Error de conexión. Inténtalo de nuevo.");
            btn.innerText = originalText;
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
