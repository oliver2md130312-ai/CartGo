<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Listas | CartGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="manifest" href="../favicon/site.webmanifest">
    <style>
        .navbar {
            width: 100%; background: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; left: 0; box-shadow: var(--shadow); z-index: 1000;
        }
        .grid-listas {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem; width: 100%; margin-top: 2rem;
        }
        .card-lista {
            background: white; padding: 1.5rem; border-radius: 20px;
            box-shadow: var(--shadow); transition: var(--transition);
            border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between;
        }
        .card-lista:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
        .badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; font-weight: 700; text-transform: uppercase; }
        .badge-owner { background: #e8f8f0; color: #27ae60; }
        .badge-guest { background: #e3f2fd; color: #3498db; }
        .card-actions { display: flex; gap: 10px; margin-top: 1.5rem; }
        .btn-sm { padding: 0.6rem 1.2rem; font-size: 0.85rem; flex: 1; }
        .btn-delete { background: #fff0f0; color: #ff7675; border: 1px solid #ff7675; }
        .btn-exit { background: #f8f9fa; color: #666; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight: 700; color: var(--primary); font-size: 1.5rem;">CartGo</div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span id="displayUser" style="font-weight: 600;">Cargando...</span>
            <a href="#" onclick="logout()" style="color: #ff7675; text-decoration: none; font-size: 0.8rem; font-weight: 700;">SALIR</a>
        </div>
    </nav>

    <main class="container" style="margin-top: 100px; align-items: flex-start;">
        <header style="width: 100%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h1 style="text-align: left; margin: 0;">Mis Listas</h1>
                <p style="color: var(--text-muted);">Organiza y comparte tus compras.</p>
            </div>
            <button class="btn btn-primary" onclick="crearNuevaLista()">+ Crear Nueva Lista</button>
        </header>

        <div class="grid-listas" id="gridListas">
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #999;">Cargando tus listas...</div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2026 CartGo - Tu lista de la compra inteligente</p>
            <p style="color:#95a5a6; font-size:0.8rem;">🔄 Los cambios pueden tardar unos segundos en sincronizarse.</p>
        </div>
    </footer>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzgT7fMgUJezpZlKU060N3p0SqLDEQKPByZG94a2-GIna7xIWkbCa0sJy3T3JWGw4Wq/exec";
        const userEmail = localStorage.getItem('userEmail');
        const userName = localStorage.getItem('userName');

        if (!userEmail) window.location.href = '../login/';
        document.getElementById('displayUser').innerText = userName;

        async function cargarListas() {
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getLists", email: userEmail })
                });
                const data = await response.json();
                const grid = document.getElementById('gridListas');
                grid.innerHTML = "";

                if (data.listas && data.listas.length > 0) {
                    data.listas.forEach(lista => {
                        const card = document.createElement('div');
                        card.className = 'card-lista';
                        const badgeClass = lista.isOwner ? 'badge-owner' : 'badge-guest';
                        const badgeText = lista.isOwner ? 'Dueño' : 'Invitado';

                        card.innerHTML = `
                            <div>
                                <span class="badge ${badgeClass}">${badgeText}</span>
                                <h3 style="margin:0.5rem 0; font-size:1.4rem;">${lista.nombre}</h3>
                            </div>
                            <div class="card-actions">
                                <button onclick="abrirLista('${lista.id}', '${lista.nombre}', ${lista.isOwner})" class="btn btn-primary btn-sm">Abrir</button>
                                ${lista.isOwner 
                                    ? `<button onclick="eliminarLista('${lista.id}')" class="btn btn-sm btn-delete">Eliminar</button>` 
                                    : `<button onclick="salirDeLista('${lista.id}')" class="btn btn-sm btn-exit">Salirse</button>`}
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; color:#999;">No tienes listas aún.</div>`;
                }
            } catch (e) { console.error(e); }
        }

        async function crearNuevaLista() {
            const nombre = prompt("Nombre de la lista:");
            if (!nombre) return;
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "createList", nombre_lista: nombre, owner_email: userEmail })
            });
            cargarListas();
        }

        async function eliminarLista(id) {
            if (!confirm("¿Borrar lista permanentemente?")) return;
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "deleteList", idLista: id, email: userEmail })
            });
            cargarListas();
        }

        async function salirDeLista(id) {
            if (!confirm("¿Seguro que quieres salirte de esta lista?")) return;
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "removeMe", idLista: id, email: userEmail })
            });
            cargarListas();
        }

        function abrirLista(id) {
            window.location.href = `../lista/?id=${id}`;
        }

        function logout() { localStorage.clear(); window.location.href = '../'; }
        cargarListas();
    </script>
</body>
</html>
